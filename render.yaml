services:
  - type: web
    name: personal-ia-api
    runtime: node
    plan: free
    healthCheckPath: /health
    buildCommand: npm install --legacy-peer-deps && npm --workspace apps/api run build
    startCommand: npm --workspace apps/api run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PAYMENT_PROVIDER
        value: mock
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
