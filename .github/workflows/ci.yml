name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/personal_ia?schema=public
      JWT_SECRET: ci-only-secret
      JWT_EXPIRES_IN: 7d
      PAYMENT_PROVIDER: mock
      ALLOW_MOCK_BILLING_ACTIONS: "false"
      GEMINI_MODEL: gemini-2.5-flash
      VITE_API_URL: http://localhost:3333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
